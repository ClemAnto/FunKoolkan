<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Layout demo</title>
	<style>
		html {
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
		}
		body {
			display: flex;
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			background: #000;
			font-size: 20px;
		}
		#gui {
			outline: 2px solid yellow;
			outline-offset: -2px;
			display: flex;
			position: absolute;
			width: 100%;
			height: 100%;
			top: 0;
			left: 0;
			color: yellow;
		}
		#game {
			align-self: center;
			outline: 2px solid cyan;
			outline-offset: -2px;
			display: flex;
			height: min(75%, calc(95vw * 12 / 5));
			width: auto;
			position: absolute;
			left: 50%;
			bottom: 0;
			translate: -50% 0;
			aspect-ratio: 5/12;
			color: cyan;
		}
		#background {
			outline: 2px solid red;
			outline-offset: -4px;
			display: flex;
			position: absolute;
			width: 100%;
			height: 100%;
			top: 0;
			left: 0;
			color: red;
			align-items: end;
    		justify-content: end;
			object-fit: cover;
			pointer-events: none;
		}
		#warrior {
			outline: 2px solid purple;
			outline-offset: -4px;
			display: flex;
			position: absolute;
			translate: -50% -50%;
			left: 50%;
			bottom: 25%;
			width: calc(100%/10);
			height: auto;
			aspect-ratio: 1;
			border-radius: 100%;
			margin: 0;
			padding: 0;
		}
		hr {
			width: 100%;
			height: 1px;
			top: 50%;
			position: absolute;
			outline: 1px solid red;
		}
	</style>
</head>
<body>
	<main>
		<section id="gui">GUI</section>
		<section id="game">GAME
			<hr id="game-over"/>
			<figure id="warrior"></figure>
 		</section>
		<img id="background" />
	</main>
	
</body>
</html>
