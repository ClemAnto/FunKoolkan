<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>FunKoolkan</title>

  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">

  <link rel="stylesheet" type="text/css" href="style.f76d1.css"/>

  <style>
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .ls-logo {
      width: min(70vw, 360px);
      height: auto;
      margin-bottom: 6px;
      image-rendering: -webkit-optimize-contrast;
    }
    .ls-subtitle {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.85em;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 44px;
    }
    .ls-version {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.72em;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      margin-top: 20px;
    }
    .ls-pct {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 1.3em;
      font-weight: bold;
      color: #ffd432;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <img class="ls-logo" src="title.2f6be.png" alt="FunKoolkan"/>
    <div class="ls-subtitle">Loading</div>
    <div class="ls-pct" id="ls-pct">0%</div>
    <div class="ls-version">v0.2.12</div>
  </div>

  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
    </div>
  </div>

<!-- Firebase compat SDK is NOT loaded here on purpose: two synchronous gstatic <script> tags
     would block game startup. FirestoreLeaderboard._loadSdk injects them lazily from the CDN the
     first time the leaderboard is actually used, so the boot path stays free of external requests. -->

<script src="src/polyfills.bundle.5adbf.js?v=0.2.12" charset="utf-8"> </script>
<script src="src/system.bundle.543e6.js?v=0.2.12" charset="utf-8"> </script>
<script src="src/import-map.d4f36.json?v=0.2.12" type="systemjs-importmap" charset="utf-8"> </script>

<script>
(function () {
    var pctEl = document.getElementById('ls-pct');
    // Hybrid progress (% only): phase 1 (engine cc.js download — no JS hook) eases cosmetically toward
    // ~72%; phase 2 starts at the REAL "engine ready" milestone and eases toward ~95%; the REAL
    // scene-launch milestone snaps to 100% and fades out.
    var pct = 0, launched = false, ccReady = false, t0 = Date.now(), ccAt = 0;

    function render() {
        if (pctEl) pctEl.textContent = Math.round(pct) + '%';
    }
    function loop() {
        var target;
        if (launched)      target = 100;
        else if (ccReady)  target = Math.min(95, 75 + (Date.now() - ccAt) / 25);
        else               target = Math.min(72, (Date.now() - t0) / 30);
        pct += (target - pct) * 0.12;
        if (!launched && pct > 99) pct = 99;
        render();
        if (launched && pct >= 99.5) { hideLoading(); return; }
        requestAnimationFrame(loop);
    }
    function hideLoading() {
        if (pctEl) pctEl.textContent = '100%';
        var el = document.getElementById('loading-screen');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(function () { el.style.display = 'none'; }, 550);
    }
    function waitForCC() {
        if (typeof window.cc !== 'undefined' && window.cc.director) {
            ccReady = true; ccAt = Date.now();
            window.cc.director.once(window.cc.Director.EVENT_AFTER_SCENE_LAUNCH, function () { launched = true; });
        } else {
            setTimeout(waitForCC, 50);
        }
    }
    requestAnimationFrame(loop);
    waitForCC();

    System.import('./index.af941.js?v=0.2.12').catch(function (err) { console.error(err); });
})();
</script>

</body>
</html>
